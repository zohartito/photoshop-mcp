# Creates a GitHub Release when a version tag (v*) is pushed.
# Release notes include npm install commands, registry links, and commit changelog.
# npm publish remains a separate manual step — see CONTRIBUTING.md § Releasing.
name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build release notes
        id: notes
        run: |
          PREV=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1 || true)
          BODY=$(bash scripts/build-release-notes.sh "${GITHUB_REF_NAME}" "${PREV}")
          { echo "body<<EOF"; echo "$BODY"; echo "EOF"; } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.body }}
          skip_if_release_exists: true
