name: secret-scan

on:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          # No GITLEAKS_LICENSE needed: gitleaks-action is free for personal
          # (non-organization) GitHub accounts.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
